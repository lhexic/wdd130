<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us – White Water Rafting Company</title>
    <meta name="description"
      content="Contact White Water Rafting Company for trip info, reservations, or website feedback. Find our address, phone, email, and map.">
    <meta name="author" content="Jonathan Kwadjo Azanu">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/lifeisbetter.jpg" alt="Logo of the Company" width="150">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>

        </nav>

    </header>
    <main>
        <div class="hero">
            <h1>Lhexic's Whitewater Rafting</h1>
        </div>
        <section class="company-info">
            <p>Merciful Clinic Back<br>
                Ho, Ghana</p>
            <p>+233 591 769 964</p>
            <p>info@whitewater.com</p>
        </section>

        <section class="form-container">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d63413.191143401804!2d0.42386322097565954!3d6.606545320913933!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x102725152a227ba1%3A0x9da6ad4a4c9a2107!2sHo!5e0!3m2!1sen!2sgh!4v1775330682529!5m2!1sen!2sgh"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
            <form action="#" method="post">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="Your name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>

                <fieldset>
                    <legend>Message Purpose</legend>

                    <input type="radio" id="purpose-general" name="purpose" value="general"
                      required>
                    <label for="purpose-general">General Inquiry</label>

                    <input type="radio" id="purpose-reservation" name="purpose" value="reservation">
                    <label for="purpose-reservation">Reservation Question</label>

                    <input type="radio" id="purpose-website" name="purpose" value="website">
                    <label for="purpose-website">Website Suggestion</label>
                </fieldset>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Type here"
                  required></textarea>

                <input type="checkbox" id="newsletter" name="newsletter" value="yes">
                <label for="newsletter">Please subscribe me to the monthly newsletter</label>

                <button type="submit">Get in Touch!</button>
            </form>
        </section>
        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <div class="profile-grid">
                <figure>
                    <img src="images/mahama.jpeg" alt="President of Ghana, Manager" width="150">
                    <figcaption>President of Ghana, Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/dzeto.jpg" alt="Okudzeto Samuel, Investor" width="150">
                    <figcaption>Okudzeto Samuel, MP-North Tongu-Investor</figcaption>
                </figure>
                <figure>
                    <img src="images/jona.jpeg" alt="Jonathan Kwadjo-Lead Guide" width="150">
                    <figcaption>Jonathan Kwadjo-Lead Guide</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>©2026 🚣‍♂️🌊Lhexic Whitewater Rafting🚣‍♀️🌊 Jonathan Kwadjo Azanu</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook-square.svg" alt="Facebook Icon" width="50">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-square.svg" alt="Linkedin Icon" width="50">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram-square.svg" alt="Instagram" width="50">
            </a>
        </nav>
    </footer>
</body>

</html>
